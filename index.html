<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korku Hafıza Oyunu</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #ccc;
}

/* Giriş ekranı */
#startScreen {
    text-align: center;
}

#startBtn {
    padding: 15px 30px;
    font-size: 20px;
    background: black;
    color: red;
    border: 2px solid red;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 15px red;
    transition: 0.3s;
}

#startBtn:active {
    transform: scale(0.95);
}

/* Oyun */
#gameContainer {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

h1 {
    margin: 15px;
    font-size: 22px;
    color: red;
    text-shadow: 0 0 10px red;
}

#game {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: 95vw;
    max-width: 500px;
}

.card {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
}

.card:active {
    transform: scale(0.95);
}

.card.flip {
    transform: rotateY(180deg);
}

.card img, .back {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    position: absolute;
    backface-visibility: hidden;
}

.front {
    transform: rotateY(180deg);
    object-fit: cover;
}

.back {
    background: radial-gradient(circle, #111, #000);
    border: 2px solid #220000;
    display: flex;
    align-items: center;
    justify-content: center;
    color: darkred;
    font-size: 24px;
    text-shadow: 0 0 8px red;
}

@keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-1px, 1px); }
    50% { transform: translate(1px, -1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(0); }
}

.back span {
    animation: glitch 0.4s infinite;
}
</style>
</head>

<body>

<!-- Giriş -->
<div id="startScreen">
    <h1>☠ HAZIR MISIN? ☠</h1>
    <button id="startBtn">GİRİŞ</button>
</div>

<!-- Oyun -->
<div id="gameContainer">
    <h1>☠ KORKU HAFIZA ☠</h1>
    <div id="game"></div>
</div>

<!-- Ses -->
<audio id="bgMusic" src="1.mp3" loop></audio>

<script>
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const gameContainer = document.getElementById("gameContainer");
const music = document.getElementById("bgMusic");

startBtn.onclick = () => {
    startScreen.style.display = "none";
    gameContainer.style.display = "flex";

    music.volume = 0.3; // %30 ses
    music.play();
};

/* OYUN KODU */
const images = [
    "1.png","2.png","3.png","4.png","5.png",
    "6.png","7.png","8.png","9.png","10.png"
];

let cardsArray = [...images, ...images];
cardsArray.sort(() => 0.5 - Math.random());

const game = document.getElementById("game");

let firstCard = null;
let secondCard = null;
let lockBoard = false;

cardsArray.forEach((img) => {
    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <img class="front" src="${img}">
        <div class="back"><span>☠</span></div>
    `;

    card.addEventListener("click", () => flipCard(card, img));
    game.appendChild(card);
});

function flipCard(card, img) {
    if (lockBoard || card === firstCard) return;

    card.classList.add("flip");

    if (!firstCard) {
        firstCard = { card, img };
        return;
    }

    secondCard = { card, img };
    checkMatch();
}

function checkMatch() {
    if (firstCard.img === secondCard.img) {
        resetBoard();
    } else {
        lockBoard = true;
        setTimeout(() => {
            firstCard.card.classList.remove("flip");
            secondCard.card.classList.remove("flip");
            resetBoard();
        }, 800);
    }
}

function resetBoard() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
}
</script>

</body>
</html>
